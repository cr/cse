# asm_src_test.cfg — linker config for the asm_src py65 test binary
#
# Code at $4000+ mirrors production layout (workspace below, code high).

MEMORY {
    ZP:  start = $0000, size = $0100, type = rw,  fill = yes, fillval = $00, define = yes;
    RAM: start = $4000, size = $4000, type = rw,  fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp,  start = $0002, optional = yes;
    CODE:     load = RAM, type = rw;
    RODATA:   load = RAM, type = ro,  optional = yes;
    KDATA:    load = RAM, type = ro,  optional = yes;    DATA:     load = RAM, type = rw,  optional = yes;
    BSS:      load = RAM, type = bss, optional = yes;
}
