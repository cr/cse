# test.cfg – minimal linker config for host-side unit test binaries
#
# Produces a raw flat binary with no load-address header:
#   ZP  at $00     (zero page)
#   RAM at $0200   (code / rodata)
#
# IMPORTANT: ZP memory starts at $0000 for binary format compatibility
# (loaders assume ZP = first $100 bytes of binary). The ZEROPAGE segment
# starts at $0002 to skip the CPU I/O port at $00/$01.
#
# Usage:
#   ld65 -C dev/test.cfg obj1.o obj2.o -o out.bin

MEMORY {
    ZP:  start = $0000, size = $0100, type = rw,  fill = yes, fillval = $00;
    RAM: start = $0200, size = $4000, type = rw,  fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp,  start = $0002, optional = yes;
    CODE:     load = RAM, type = rw;
    RODATA:   load = RAM, type = ro,  optional = yes;
    KDATA:    load = RAM, type = ro,  optional = yes;
    BSS:      load = RAM, type = bss, optional = yes;
}
