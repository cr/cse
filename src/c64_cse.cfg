# c64_cse.cfg — Custom linker config for CSE
#
# Pure assembly build — no C runtime.
# ZP: $02–$7F (126 bytes) for CSE modules.
# BASIC SYS stub in EXEHDR, startup code in STARTUP segment.
# KDATA: read-only tables copied to RAM under KERNAL at startup.

SYMBOLS {
    __HIMEM__:     type = weak, value = $D000;
}
MEMORY {
    ZP:       file = "",  define = yes, start = $0002,              size = $007E;
    LOADADDR: file = %O,               start = $0801 - 2,          size = $0002;
    HEADER:   file = %O,  define = yes, start = $0801,             size = $000C;
    MAIN:     file = %O,  define = yes, start = __HEADER_LAST__,   size = __HIMEM__ - __HEADER_LAST__;
    BSS:      file = "",               start = __MAIN_LAST__,      size = __HIMEM__ - __MAIN_LAST__;
    KDATA:    file = "",               start = $F100,             size = $0EFA;
}
SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    LOADADDR: load = LOADADDR, type = ro;
    EXEHDR:   load = HEADER,   type = ro;
    STARTUP:  load = MAIN,     type = ro;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    KDATA:    load = MAIN,     type = ro,  run = KDATA, define = yes;
    DATA:     load = MAIN,     type = rw;
    BSS:      load = BSS,      type = bss, define = yes;
}
